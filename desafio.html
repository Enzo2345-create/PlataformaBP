<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio — Plataforma PRISMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay"></div>
  <button id="btnMenu" class="btn-menu">☰</button>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="conteudo">
      <header class="topbar"><div class="busca"></div><div class="perfil"></div></header>
      <section class="feed">

        <div class="bloco">
          <h2 class="titulo-bloco">🧩 Desafio</h2>
          <p class="subtitulo-bloco">Missões, conquistas e ranking</p>
        </div>

        <!-- Barra de XP do usuário -->
        <div class="bloco">
          <div class="card-xp">
            <div class="xp-label" id="xpTexto">Carregando...</div>
            <div class="barra-xp-track">
              <div class="barra-xp-fill" id="xpBar" style="width:0%"></div>
            </div>
          </div>
        </div>

        <!-- Desafio principal -->
        <div class="bloco">
          <div class="card-desafio-principal" id="desafioPrincipal"></div>
        </div>

        <!-- Missões -->
        <div class="bloco">
          <h2 class="titulo-bloco">Missões ativas</h2>
          <div class="grade-desafios"></div>
        </div>

        <!-- Conquistas -->
        <div class="bloco">
          <h2 class="titulo-bloco">Conquistas</h2>
          <div class="grade-fontes conquistas-grade"></div>
        </div>

        <!-- Ranking -->
        <div class="bloco">
          <h2 class="titulo-bloco">Ranking</h2>
          <div class="grade-ranking"></div>
        </div>

      </section>
    </main>
  </div>
  <script src="dados.js"></script>
  <script src="script.js"></script>
</body>
</html>
