<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memória — Plataforma PRISMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="overlay"></div>
  <button id="btnMenu" class="btn-menu">☰</button>

  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="conteudo">
      <header class="topbar">
        <div class="busca"></div>
        <div class="perfil"></div>
      </header>

      <section class="feed">

        <!-- BLOCO 1: Título -->
        <div class="bloco">
          <h2 class="titulo-bloco">📜 Memória</h2>
          <p class="subtitulo-bloco">Arquivo histórico e registros do passado</p>
        </div>

        <!-- BLOCO 2: Cards de épocas -->
        <div class="bloco">
          <h2 class="titulo-bloco">Épocas</h2>
          <div class="grade-epocas">
            <div class="card-epoca">
              <span class="epoca-ano">1950</span>
              <div class="placeholder ph-linha media"></div>
              <div style="height:6px"></div>
              <div class="placeholder ph-linha curta"></div>
            </div>
            <div class="card-epoca">
              <span class="epoca-ano">1970</span>
              <div class="placeholder ph-linha media"></div>
              <div style="height:6px"></div>
              <div class="placeholder ph-linha curta"></div>
            </div>
            <div class="card-epoca">
              <span class="epoca-ano">1990</span>
              <div class="placeholder ph-linha media"></div>
              <div style="height:6px"></div>
              <div class="placeholder ph-linha curta"></div>
            </div>
            <div class="card-epoca">
              <span class="epoca-ano">2010</span>
              <div class="placeholder ph-linha media"></div>
              <div style="height:6px"></div>
              <div class="placeholder ph-linha curta"></div>
            </div>
          </div>
        </div>

        <!-- BLOCO 3: Timeline -->
        <div class="bloco">
          <h2 class="titulo-bloco">Linha do tempo</h2>

          <div class="timeline">

            <div class="timeline-item">
              <div class="timeline-ano">2026</div>
              <div class="timeline-card">
                <div class="placeholder ph-titulo"></div>
                <div class="placeholder ph-linha media"></div>
                <div style="height:6px"></div>
                <div class="placeholder ph-linha curta"></div>
              </div>
            </div>

            <div class="timeline-item">
              <div class="timeline-ano">2024</div>
              <div class="timeline-card">
                <div class="placeholder ph-titulo"></div>
                <div class="placeholder ph-linha media"></div>
                <div style="height:6px"></div>
                <div class="placeholder ph-linha curta"></div>
              </div>
            </div>

            <div class="timeline-item">
              <div class="timeline-ano">2020</div>
              <div class="timeline-card">
                <div class="placeholder ph-titulo"></div>
                <div class="placeholder ph-linha media"></div>
                <div style="height:6px"></div>
                <div class="placeholder ph-linha curta"></div>
              </div>
            </div>

            <div class="timeline-item">
              <div class="timeline-ano">2015</div>
              <div class="timeline-card">
                <div class="placeholder ph-titulo"></div>
                <div class="placeholder ph-linha media"></div>
                <div style="height:6px"></div>
                <div class="placeholder ph-linha curta"></div>
              </div>
            </div>

            <div class="timeline-item">
              <div class="timeline-ano">2010</div>
              <div class="timeline-card">
                <div class="placeholder ph-titulo"></div>
                <div class="placeholder ph-linha media"></div>
                <div style="height:6px"></div>
                <div class="placeholder ph-linha curta"></div>
              </div>
            </div>

          </div>
        </div>

        <!-- BLOCO 4: Artigos históricos -->
        <div class="bloco">
          <h2 class="titulo-bloco">Documentos históricos</h2>
          <div class="lista-artigos">
            <article class="artigo">
              <div class="artigo-info">
                <span class="artigo-tipo">Documento</span>
                <span class="artigo-data">1998</span>
              </div>
              <h3 class="artigo-titulo"></h3>
              <p class="artigo-autores"></p>
              <div class="artigo-imagem"></div>
            </article>
            <article class="artigo">
              <div class="artigo-info">
                <span class="artigo-tipo">Registro</span>
                <span class="artigo-data">1985</span>
              </div>
              <h3 class="artigo-titulo"></h3>
              <p class="artigo-autores"></p>
              <div class="artigo-imagem"></div>
            </article>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
