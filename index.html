<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início — Plataforma PRISMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="overlay"></div>
  <button id="btnMenu" class="btn-menu">☰</button>

  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="conteudo">
      <header class="topbar">
        <div class="busca"></div>
        <div class="perfil"></div>
      </header>

      <section class="feed">

        <!-- BLOCO 1: Hero + grade de cards -->
        <div class="bloco bloco-topo">
          <div class="card card-destaque"></div>
          <div class="grade-cards">
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>
          </div>
        </div>

        <!-- BLOCO 2: Recomendações -->
        <div class="bloco bloco-recomendacoes">
          <h2 class="titulo-bloco">Recomendações</h2>
          <div class="lista-noticias">
            <div class="noticia"></div>
            <div class="noticia"></div>
            <div class="noticia"></div>
            <div class="noticia"></div>
            <div class="noticia"></div>
            <div class="noticia"></div>
          </div>
        </div>

        <!-- BLOCO 3: Fontes -->
        <div class="bloco bloco-fontes">
          <h2 class="titulo-bloco">Fontes</h2>
          <div class="grade-fontes">
            <div class="card-fonte"></div>
            <div class="card-fonte"></div>
            <div class="card-fonte"></div>
            <div class="card-fonte"></div>
          </div>
        </div>

        <!-- BLOCO 4: Artigos -->
        <div class="bloco bloco-artigos">
          <h2 class="titulo-bloco">Artigos de pesquisa mais recentes</h2>
          <div class="lista-artigos">

            <article class="artigo">
              <div class="artigo-info">
                <span class="artigo-tipo">Artigo</span>
                <span class="artigo-data">19 fev 2026</span>
              </div>
              <h3 class="artigo-titulo"></h3>
              <p class="artigo-autores"></p>
              <div class="artigo-imagem"></div>
            </article>

            <article class="artigo">
              <div class="artigo-info">
                <span class="artigo-tipo">Artigo</span>
                <span class="artigo-data">18 fev 2026</span>
              </div>
              <h3 class="artigo-titulo"></h3>
              <p class="artigo-autores"></p>
              <div class="artigo-imagem"></div>
            </article>

          </div>
        </div>

      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
