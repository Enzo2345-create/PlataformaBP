<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conceitos — Plataforma PRISMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay"></div>
  <button id="btnMenu" class="btn-menu">☰</button>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="conteudo">
      <header class="topbar"><div class="busca"></div><div class="perfil"></div></header>
      <section class="feed">

        <div class="bloco">
          <h2 class="titulo-bloco">🧠 Conceitos</h2>
          <p class="subtitulo-bloco">Glossário e definições fundamentais</p>
        </div>

        <div class="bloco">
          <div class="destaque-conceito"></div>
        </div>

        <div class="bloco">
          <div class="linha-categoria">
            <div class="tag-categoria ativa"></div>
            <div class="tag-categoria"></div>
            <div class="tag-categoria"></div>
            <div class="tag-categoria"></div>
          </div>
        </div>

        <div class="bloco">
          <h2 class="titulo-bloco">Todos os conceitos</h2>
          <div class="grade-conceitos">
            <div class="card-conceito"></div>
            <div class="card-conceito"></div>
            <div class="card-conceito"></div>
            <div class="card-conceito"></div>
            <div class="card-conceito"></div>
            <div class="card-conceito"></div>
          </div>
        </div>

        <div class="bloco">
          <h2 class="titulo-bloco">Artigos relacionados</h2>
          <div class="lista-artigos">
            <article class="artigo">
              <div class="artigo-info"><span class="artigo-tipo">Conceito</span><span class="artigo-data"></span></div>
              <h3 class="artigo-titulo"></h3><p class="artigo-autores"></p><div class="artigo-imagem"></div>
            </article>
          </div>
        </div>

      </section>
    </main>
  </div>
  <script src="dados.js"></script>
  <script src="script.js"></script>
</body>
</html>
