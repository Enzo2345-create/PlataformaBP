<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retratos — Plataforma PRISMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay"></div>
  <button id="btnMenu" class="btn-menu">☰</button>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="conteudo">
      <header class="topbar"><div class="busca"></div><div class="perfil"></div></header>
      <section class="feed">

        <div class="bloco">
          <h2 class="titulo-bloco">📊 Retratos</h2>
          <p class="subtitulo-bloco">Dados, estatísticas e análises quantitativas do Brasil</p>
        </div>

        <div class="bloco">
          <div class="grade-stats">
            <div class="card-stat"></div>
            <div class="card-stat"></div>
            <div class="card-stat"></div>
            <div class="card-stat"></div>
          </div>
        </div>

        <div class="bloco">
          <h2 class="titulo-bloco">Análises</h2>
          <div class="grade-graficos">
            <div class="card-grafico">
              <div class="grafico-header">
                <div class="grafico-titulo">Evolução do IDH brasileiro (2000–2025)</div>
              </div>
              <canvas id="graficoIDH" height="180"></canvas>
            </div>
            <div class="card-grafico">
              <div class="grafico-header">
                <div class="grafico-titulo">Coeficiente de Gini por região (2025)</div>
              </div>
              <canvas id="graficoGini" height="180"></canvas>
            </div>
          </div>
        </div>

        <div class="bloco">
          <div class="grade-graficos" style="grid-template-columns: 1fr 2fr;">
            <div class="card-grafico">
              <div class="grafico-header">
                <div class="grafico-titulo">Composição por raça/cor</div>
                <div class="grafico-sub">IBGE 2025</div>
              </div>
              <canvas id="graficoRaca" height="220"></canvas>
            </div>
            <div class="card-grafico">
              <div class="grafico-header">
                <div class="grafico-titulo">Renda média domiciliar por quintil (R$)</div>
              </div>
              <canvas id="graficoRenda" height="220"></canvas>
            </div>
          </div>
        </div>

        <div class="bloco">
          <h2 class="titulo-bloco">Fontes de dados</h2>
          <div class="grade-fontes">
            <div class="card-fonte"></div>
            <div class="card-fonte"></div>
            <div class="card-fonte"></div>
            <div class="card-fonte"></div>
          </div>
        </div>

      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="dados.js"></script>
  <script src="script.js"></script>
</body>
</html>
