<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidade — Plataforma PRISMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="overlay"></div>
  <button id="btnMenu" class="btn-menu">☰</button>
  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="conteudo">
      <header class="topbar"><div class="busca"></div><div class="perfil"></div></header>
      <section class="feed">

        <div class="bloco">
          <h2 class="titulo-bloco">🗣 Comunidade</h2>
          <p class="subtitulo-bloco">Discussões e conexões entre membros</p>
        </div>

        <div class="bloco">
          <h2 class="titulo-bloco">Membros ativos</h2>
          <div class="grade-usuarios"></div>
        </div>

        <div class="bloco">
          <h2 class="titulo-bloco">Discussões recentes</h2>
          <div class="lista-posts"></div>
        </div>

      </section>
    </main>
  </div>
  <script src="dados.js"></script>
  <script src="script.js"></script>
</body>
</html>
